name: nexaflow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  supabase_flutter: ^2.12.4
  url_launcher: ^6.3.2
  google_fonts: ^8.1.0
  http: ^1.6.0
  file_picker: ^8.1.2
  csv: ^6.0.0
